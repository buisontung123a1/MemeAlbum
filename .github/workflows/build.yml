name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK manually
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmdtools.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Accept licenses & install SDK packages
        run: |
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.1/bin/gradle wrapper --gradle-version=8.1 --distribution-type=bin
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Get version info
        id: version
        run: |
          echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/MemeAlbum-v${{ steps.version.outputs.date }}-${{ steps.version.outputs.sha }}.apk

      - name: Delete old release if exists
        run: |
          gh release delete latest-build --yes || true
          git push origin :refs/tags/latest-build || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "🐸 MemeAlbum - Build ${{ steps.version.outputs.date }}"
          body: |
            ## 📦 MemeAlbum Debug APK

            **Build:** `${{ steps.version.outputs.date }}`
            **Commit:** `${{ steps.version.outputs.sha }}`

            ### Cách cài:
            1. Tải file `.apk` bên dưới
            2. Bật **Cài từ nguồn không rõ** trong Settings → Security
            3. Mở file APK → Cài đặt

            ### Tính năng:
            - 🎵 Splash screen YouTube 10 giây
            - 📸 Album meme từ r/memes (Hot / New / Top)
            - 🔍 Zoom ảnh, share, copy link
            - ♾️ Infinite scroll tự load thêm
          files: |
            app/build/outputs/apk/debug/MemeAlbum-v${{ steps.version.outputs.date }}-${{ steps.version.outputs.sha }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
